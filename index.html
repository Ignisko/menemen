<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menemen: The Dual Adventure</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #FF6F00;
            --yellow: #FFCA28;
            --blue: #0077be;
            --dark: #1a1a2e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
        }

        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('menemen_hub_background.png') no-repeat center center;
            background-size: cover;
            opacity: 0.6;
            z-index: -1;
            filter: blur(2px);
            transition: transform 0.5s ease;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            z-index: 10;
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
            text-align: center;
            background: linear-gradient(to bottom, #fff, #bbb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .games {
            display: flex;
            gap: 30px;
            width: 100%;
        }

        .card {
            flex: 1;
            height: 400px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 30px;
            text-decoration: none;
            color: white;
        }

        .card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card.game1 {
            background: linear-gradient(to bottom, transparent, rgba(255, 111, 0, 0.8));
        }

        .card.game2 {
            background: linear-gradient(to bottom, transparent, rgba(0, 119, 190, 0.8));
        }

        .card h2 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .card p {
            font-size: 1rem;
            opacity: 0.8;
            line-height: 1.4;
        }

        .card .badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: white;
            color: black;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .games {
                flex-direction: column;
            }
            .card {
                height: 250px;
            }
            h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="container">
        <h1>Select Your Journey</h1>
        <div class="games">
            <a href="menemen1.html" class="card game1">
                <div class="badge">Runner</div>
                <h2>Village Run</h2>
                <p>Run through the Turkish countryside, collect ingredients, and outrun the pans!</p>
            </a>
            <a href="menemen2.html" class="card game2">
                <div class="badge">Descent</div>
                <h2>Ocean Descent</h2>
                <p>Dive deep into the mystic ocean. Follow floating sea life to reach the legendary Menemen depth.</p>
            </a>
        </div>
    </div>

    <script>
        // Subtle mouse parallax for the background
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) / 50;
            const moveY = (e.clientY - window.innerHeight / 2) / 50;
            document.querySelector('.background').style.transform = `translate(${moveX}px, ${moveY}px) scale(1.05)`;
        });
    </script>
</body>
</html>
