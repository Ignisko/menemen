<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Menemen Run</title>
<meta name="description" content="A lightweight endless runner. Dodge pans and chickens, collect eggs, tomatoes & peppers to make menemen!">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#1a1a2e;display:flex;align-items:center;justify-content:center;overflow:hidden;touch-action:none;-webkit-touch-callout:none;user-select:none;font-family:monospace}
canvas{max-width:100%;height:auto;image-rendering:pixelated;border-radius:6px;box-shadow:0 4px 60px rgba(0,0,0,.6)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ═══════════════════════════════════════════
//  MENEMEN RUN — Endless Runner
//  Single-file Canvas game, zero dependencies
// ═══════════════════════════════════════════

const C = document.getElementById('c');
const X = C.getContext('2d');
C.width = 800; C.height = 300;

// ── CONSTANTS ──
const W = 800, H = 300, GND = 245;
const GRV = 0.85, JMP = -14, SPD = 4.5;
const PW = 28, PH = 50, PX = 90;

// Color palettes: street & kitchen
const PAL = [
  {sky1:'#6EC6FF',sky2:'#D4EEFF',gnd:'#9E9E9E',gndD:'#757575',tile:'#8A8A8A',wall:'#BDBDBD'},
  {sky1:'#FFDCA8',sky2:'#FFE8C8',gnd:'#D4845A',gndD:'#B06830',tile:'#C07848',wall:'#E8D0A8'}
];

// ── AUDIO ──
let AC = null;
function initAudio(){if(!AC)try{AC=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}
function tone(f1,f2,dur,vol){
  if(!AC)return;try{
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);o.type='sine';
  o.frequency.setValueAtTime(f1,AC.currentTime);
  o.frequency.linearRampToValueAtTime(f2,AC.currentTime+dur);
  g.gain.setValueAtTime(vol||.12,AC.currentTime);
  g.gain.linearRampToValueAtTime(0,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}}
const sJump=()=>tone(380,620,.08);
const sCollect=()=>tone(580,920,.1,.15);
const sCombo=()=>{tone(400,800,.25,.18);tone(500,1000,.2,.12);};
const sDie=()=>tone(320,80,.25,.15);

// ── HELPERS ──
function lerp(a,b,t){return a+(b-a)*t}
function lerpHex(c1,c2,t){
  const p=s=>[parseInt(s.slice(1,3),16),parseInt(s.slice(3,5),16),parseInt(s.slice(5,7),16)];
  const a=p(c1),b=p(c2);
  return`rgb(${a.map((v,i)=>Math.round(lerp(v,b[i],t)))})`;
}
function pc(k){// palette color with scene transition
  const t=Math.min(1,Math.max(0,G.st));
  return t<=0?PAL[0][k]:t>=1?PAL[1][k]:lerpHex(PAL[0][k],PAL[1][k],t);
}
function aabb(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;
}

// ── STATE ──
let G;
function loadHi(){try{return parseInt(localStorage.getItem('menemenHi'))||0}catch(e){return 0}}
function saveHi(){try{localStorage.setItem('menemenHi',G.hi)}catch(e){}}

function reset(){
  G={
    phase:0, // 0=start,1=run,2=over
    y:GND,vy:0,spd:SPD,
    score:0,hi:loadHi(),
    f:0,
    obs:[],col:[],pts:[],
    ot:120,ct:80,
    egg:0,tom:0,pep:0,
    hE:false,hT:false,hP:false,
    combo:false,cf:0,
    sc:0,st:0,  // scene: 0=street transitioning→1=kitchen; st=transition progress
    overT:0,shake:0,
    crouching:false,
    bx:0,bx2:0, // background scroll positions
    walkF:0
  };
}

// ── PARTICLES ──
function addPts(x,y,n,col,spread){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const v=1+Math.random()*(spread||3);
    G.pts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-1,life:30+Math.random()*20,max:50,c:col,sz:2+Math.random()*3});
  }
}
function updatePts(){
  for(let i=G.pts.length-1;i>=0;i--){
    const p=G.pts[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life--;
    if(p.life<=0)G.pts.splice(i,1);
  }
}
function drawPts(){
  for(const p of G.pts){
    X.globalAlpha=p.life/p.max;
    X.fillStyle=p.c;
    X.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);
  }
  X.globalAlpha=1;
}

// ── DRAW: BACKGROUND ──
function drawSky(){
  const gr=X.createLinearGradient(0,0,0,GND);
  gr.addColorStop(0,pc('sky1'));gr.addColorStop(1,pc('sky2'));
  X.fillStyle=gr;X.fillRect(0,0,W,GND);
}
function drawStreetBg(){
  const a=1-Math.min(1,G.st);
  if(a<=0)return;
  X.globalAlpha=a;
  // Far buildings
  X.fillStyle='#90A4AE';
  for(let i=-1;i<6;i++){
    const x=i*160-(G.bx%160);
    const h=50+((i*7+3)*13%35);
    X.fillRect(x,GND-h,70,h);
    X.fillStyle='#78909C';X.fillRect(x+80,GND-h+15,55,h-15);X.fillStyle='#90A4AE';
    // Windows
    X.fillStyle='#B3E5FC';
    for(let wy=GND-h+8;wy<GND-6;wy+=14)
      for(let wx=x+6;wx<x+62;wx+=16)X.fillRect(wx,wy,7,7);
    X.fillStyle='#90A4AE';
  }
  // Awning stripes
  for(let i=-1;i<10;i++){
    const x=i*100-(G.bx*1.2%100);
    if(((i+5)%3)===0){
      X.fillStyle='#E65100';X.fillRect(x,GND-30,50,8);
      X.fillStyle='#FFF3E0';X.fillRect(x,GND-26,50,4);
    }
  }
  X.globalAlpha=1;
}
function drawKitchenBg(){
  const a=Math.min(1,G.st);
  if(a<=0)return;
  X.globalAlpha=a;
  // Warm wall
  X.fillStyle='#F5E0C0';X.fillRect(0,0,W,GND);
  // Wall tiles (upper)
  X.fillStyle='#EDD5B0';
  for(let i=-1;i<12;i++){
    const x=i*80-(G.bx*.5%80);
    X.fillRect(x+1,60,78,78);
  }
  // Shelves
  for(let i=-1;i<5;i++){
    const x=i*220-(G.bx*.7%220);
    X.fillStyle='#8D6E42';X.fillRect(x,90,140,6);X.fillRect(x,155,140,6);
    // Pots
    X.fillStyle='#607D8B';
    X.fillRect(x+10,70,22,20);X.fillRect(x+12,65,18,5);
    X.fillRect(x+50,75,18,15);
    X.fillStyle='#BF360C';X.fillRect(x+85,68,24,22);X.fillRect(x+88,62,18,6);
    // Plates/bowls on lower shelf
    X.fillStyle='#ECEFF1';
    X.fillRect(x+15,142,18,13);X.fillRect(x+55,145,22,10);
    X.fillStyle='#FFCC80';X.fillRect(x+95,140,20,15);
  }
  X.globalAlpha=1;
}
function drawGround(){
  X.fillStyle=pc('gndD');X.fillRect(0,GND,W,3);
  X.fillStyle=pc('gnd');X.fillRect(0,GND+3,W,H-GND-3);
  // Ground detail lines
  X.fillStyle=pc('tile');
  for(let i=-1;i<14;i++){
    const x=i*70-(G.bx2%70);
    X.fillRect(x,GND+12,50,2);
    X.fillRect(x+25,GND+3,2,10);
  }
}

// ── DRAW: CHARACTER ──
function drawChar(){
  const cr=G.crouching;
  const inAir=G.y<GND;
  const h=cr?30:PH;
  const bot=G.y;
  const top=bot-h;
  const cx=PX-PW/2;
  const midX=PX; // center x

  // ─ LEGS ─
  if(!cr){
    const walking=G.phase===1&&!inAir;
    const lf=walking?Math.floor(G.walkF/5)%4:0;
    const offsets=[5,-5,-5,5];
    const lo=inAir?-4:offsets[lf]||0;
    const lo2=inAir?-4:-lo;
    X.fillStyle='#37241A';
    X.fillRect(cx+5,top+35,6,11+lo);
    X.fillRect(cx+17,top+35,6,11+lo2);
    // Shoes
    X.fillStyle='#1B0F08';
    X.fillRect(cx+4,top+45+lo,8,4);
    X.fillRect(cx+16,top+45+lo2,8,4);
  }else{
    X.fillStyle='#37241A';
    X.fillRect(cx+4,top+22,9,7);X.fillRect(cx+15,top+22,9,7);
  }

  // ─ BODY (Turkish Vest) ─
  const by=cr?top+12:top+20;
  const bh=cr?10:15;
  // White shirt
  X.fillStyle='#FFF8F0';X.fillRect(cx+4,by,20,bh);
  // Burgundy vest sides
  X.fillStyle='#7B1818';X.fillRect(cx+4,by,6,bh);X.fillRect(cx+18,by,6,bh);
  // Gold trim
  X.fillStyle='#DAA520';
  X.fillRect(cx+9,by,2,bh);X.fillRect(cx+17,by,2,bh);
  // Buttons
  X.fillRect(cx+13,by+3,2,2);
  if(bh>10)X.fillRect(cx+13,by+8,2,2);

  // ─ HEAD (Anonymous/Guy Fawkes Mask) ─
  const hh=cr?11:18;
  const hy=cr?top:top;
  const hcx=midX;
  const hcy=hy+hh/2+1;

  // Face shape — pointed chin
  X.fillStyle='#F5E6D0';
  X.beginPath();
  X.moveTo(hcx,hy+hh+1);
  X.bezierCurveTo(hcx-14,hcy+2,hcx-12,hy-1,hcx,hy-2);
  X.bezierCurveTo(hcx+12,hy-1,hcx+14,hcy+2,hcx,hy+hh+1);
  X.fill();
  // Outline
  X.strokeStyle='#D4C4A8';X.lineWidth=1;
  X.beginPath();
  X.moveTo(hcx,hy+hh+1);
  X.bezierCurveTo(hcx-14,hcy+2,hcx-12,hy-1,hcx,hy-2);
  X.bezierCurveTo(hcx+12,hy-1,hcx+14,hcy+2,hcx,hy+hh+1);
  X.stroke();

  if(!cr){
    // Arched eyebrows
    X.strokeStyle='#1A1A1A';X.lineWidth=2;
    X.beginPath();X.moveTo(hcx-9,hcy-1);X.quadraticCurveTo(hcx-5,hcy-6,hcx-1,hcy-2);X.stroke();
    X.beginPath();X.moveTo(hcx+1,hcy-2);X.quadraticCurveTo(hcx+5,hcy-6,hcx+9,hcy-1);X.stroke();
    // Eyes
    X.fillStyle='#1A1A1A';
    X.fillRect(hcx-7,hcy-1,3,3);X.fillRect(hcx+4,hcy-1,3,3);
    // Upturned mustache
    X.lineWidth=2;X.strokeStyle='#1A1A1A';X.fillStyle='#1A1A1A';
    X.beginPath();
    X.moveTo(hcx-1,hcy+3);X.quadraticCurveTo(hcx-6,hcy+5,hcx-11,hcy+1);X.stroke();
    X.beginPath();
    X.moveTo(hcx+1,hcy+3);X.quadraticCurveTo(hcx+6,hcy+5,hcx+11,hcy+1);X.stroke();
    // Mustache center
    X.beginPath();X.arc(hcx,hcy+3,2,0,Math.PI,true);X.fill();
    // Thin smile
    X.strokeStyle='#8B6050';X.lineWidth=1;
    X.beginPath();X.arc(hcx,hcy+4,4,.15*Math.PI,.85*Math.PI);X.stroke();
    // Rosy cheeks
    X.fillStyle='rgba(210,100,90,.2)';
    X.beginPath();X.arc(hcx-8,hcy+2,3,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(hcx+8,hcy+2,3,0,Math.PI*2);X.fill();
    // Goatee
    X.fillStyle='#2A1A0A';
    X.beginPath();X.moveTo(hcx-2,hcy+6);X.lineTo(hcx,hcy+9);X.lineTo(hcx+2,hcy+6);X.fill();
  }else{
    // Simplified crouching face
    X.fillStyle='#1A1A1A';
    X.fillRect(hcx-6,hcy-1,3,2);X.fillRect(hcx+3,hcy-1,3,2);
    X.beginPath();X.moveTo(hcx-1,hcy+2);X.quadraticCurveTo(hcx-5,hcy+3,hcx-8,hcy+1);X.stroke();
    X.beginPath();X.moveTo(hcx+1,hcy+2);X.quadraticCurveTo(hcx+5,hcy+3,hcx+8,hcy+1);X.stroke();
  }

  // ─ FEZ (Red Turkish hat) ─
  const fezY=hy-5;
  X.fillStyle='#B22222';
  X.beginPath();
  X.moveTo(hcx-7,hy);X.lineTo(hcx-5,fezY);X.lineTo(hcx+5,fezY);X.lineTo(hcx+7,hy);X.fill();
  X.fillRect(hcx-6,fezY,12,3);
  // Tassel
  X.strokeStyle='#1A1A1A';X.lineWidth=1.5;
  X.beginPath();X.moveTo(hcx+4,fezY);
  X.quadraticCurveTo(hcx+10,fezY-2,hcx+9,fezY+5);X.stroke();
  // Tassel tip
  X.fillStyle='#1A1A1A';
  X.beginPath();X.arc(hcx+9,fezY+5,2,0,Math.PI*2);X.fill();
}

// ── DRAW: OBSTACLES ──
function drawObs(o){
  const x=o.x,bot=GND;
  if(o.type===0){// Pan
    const y=bot-22;
    X.fillStyle='#616161';X.beginPath();X.ellipse(x+16,y+14,16,10,0,0,Math.PI*2);X.fill();
    X.fillStyle='#424242';X.beginPath();X.ellipse(x+16,y+10,14,7,0,0,Math.PI);X.fill();
    // Handle
    X.fillStyle='#795548';X.fillRect(x+30,y+8,16,5);X.fillRect(x+44,y+6,4,9);
    // Sheen
    X.fillStyle='rgba(255,255,255,.15)';X.beginPath();X.ellipse(x+12,y+8,6,4,-.3,0,Math.PI*2);X.fill();
  }else if(o.type===1){// Crate
    const h=36,y=bot-h;
    X.fillStyle='#8D6E42';X.fillRect(x,y,30,h);
    X.fillStyle='#6D4E22';X.fillRect(x,y,30,3);X.fillRect(x,y+h-3,30,3);
    X.fillRect(x,y,3,h);X.fillRect(x+27,y,3,h);
    // Cross planks
    X.strokeStyle='#6D4E22';X.lineWidth=2;
    X.beginPath();X.moveTo(x+3,y+3);X.lineTo(x+27,y+h-3);X.stroke();
    X.beginPath();X.moveTo(x+27,y+3);X.lineTo(x+3,y+h-3);X.stroke();
  }else{// Chicken
    const wad=Math.sin(G.f*.3)*2;
    const y=bot-26+wad;
    // Body
    X.fillStyle='#FAFAFA';
    X.beginPath();X.ellipse(x+13,y+14,13,11,0,0,Math.PI*2);X.fill();
    // Wing
    X.fillStyle='#E0E0E0';
    X.beginPath();X.ellipse(x+10,y+14,8,7,.2,0,Math.PI*2);X.fill();
    // Head
    X.fillStyle='#FAFAFA';X.beginPath();X.arc(x+24,y+4,6,0,Math.PI*2);X.fill();
    // Comb
    X.fillStyle='#E53935';
    X.beginPath();X.moveTo(x+22,y-2);X.lineTo(x+24,y-5);X.lineTo(x+26,y-1);X.lineTo(x+28,y-4);X.lineTo(x+29,y);X.lineTo(x+21,y);X.fill();
    // Beak
    X.fillStyle='#FF8F00';
    X.beginPath();X.moveTo(x+29,y+3);X.lineTo(x+34,y+5);X.lineTo(x+29,y+7);X.fill();
    // Eye
    X.fillStyle='#1A1A1A';X.fillRect(x+26,y+2,2,2);
    // Legs
    X.strokeStyle='#FF8F00';X.lineWidth=2;
    X.beginPath();X.moveTo(x+8,y+24);X.lineTo(x+6,bot);X.moveTo(x+4,bot);X.lineTo(x+9,bot);X.stroke();
    X.beginPath();X.moveTo(x+16,y+24);X.lineTo(x+18,bot);X.moveTo(x+15,bot);X.lineTo(x+21,bot);X.stroke();
  }
}

// ── DRAW: COLLECTIBLES ──
function drawCol(c){
  const x=c.x,y=c.y;
  // Glow
  X.fillStyle=c.type===0?'rgba(255,255,230,.15)':c.type===1?'rgba(255,80,60,.12)':'rgba(80,200,80,.12)';
  X.beginPath();X.arc(x,y,12,0,Math.PI*2);X.fill();
  // Bobbing
  const bob=Math.sin(G.f*.08+c.x)*2;
  const dy=y+bob;
  if(c.type===0){// Egg
    X.fillStyle='#FFFDE7';
    X.beginPath();X.ellipse(x,dy,6,8,0,0,Math.PI*2);X.fill();
    X.fillStyle='#FFF9C4';
    X.beginPath();X.ellipse(x-1,dy-2,3,4,0,0,Math.PI*2);X.fill();
  }else if(c.type===1){// Tomato
    X.fillStyle='#E53935';
    X.beginPath();X.arc(x,dy,7,0,Math.PI*2);X.fill();
    X.fillStyle='#C62828';
    X.beginPath();X.arc(x+1,dy+2,5,0,Math.PI*2);X.fill();
    // Stem
    X.fillStyle='#4CAF50';
    X.fillRect(x-1,dy-9,2,4);
    X.beginPath();X.moveTo(x-4,dy-7);X.quadraticCurveTo(x,dy-10,x+4,dy-7);X.strokeStyle='#4CAF50';X.lineWidth=1.5;X.stroke();
  }else{// Pepper
    X.fillStyle='#43A047';
    X.beginPath();
    X.moveTo(x,dy-8);X.bezierCurveTo(x+8,dy-6,x+7,dy+4,x+2,dy+9);
    X.bezierCurveTo(x-1,dy+10,x-7,dy+4,x-6,dy-2);
    X.bezierCurveTo(x-5,dy-6,x-2,dy-8,x,dy-8);X.fill();
    // Stem
    X.fillStyle='#2E7D32';X.fillRect(x-1,dy-11,2,4);
    // Highlight
    X.fillStyle='rgba(255,255,255,.2)';
    X.beginPath();X.ellipse(x-2,dy-2,2,5,-.2,0,Math.PI*2);X.fill();
  }
}

// ── DRAW: HUD ──
function drawHUD(){
  // Score
  X.font='bold 16px monospace';X.textAlign='left';
  X.fillStyle='rgba(0,0,0,.5)';X.fillText('SCORE',12,22);
  X.fillStyle='#FFF';X.fillText(String(G.score).padStart(6,'0'),12,40);
  // High score
  X.textAlign='right';
  X.fillStyle='rgba(0,0,0,.5)';X.fillText('HI',W-12,22);
  X.fillStyle='#FFD54F';X.fillText(String(G.hi).padStart(6,'0'),W-12,40);
  // Ingredient tracker
  X.textAlign='left';X.font='bold 12px monospace';
  const ix=12,iy=58;
  // Egg
  X.fillStyle=G.hE?'#FFFDE7':'rgba(255,255,255,.3)';
  X.fillText(G.hE?'✓':'○',ix,iy);
  X.fillStyle='#FFFDE7';X.fillText('🥚'+G.egg,ix+14,iy);
  // Tomato
  X.fillStyle=G.hT?'#EF5350':'rgba(255,255,255,.3)';
  X.fillText(G.hT?'✓':'○',ix+62,iy);
  X.fillStyle='#EF5350';X.fillText('🍅'+G.tom,ix+76,iy);
  // Pepper
  X.fillStyle=G.hP?'#66BB6A':'rgba(255,255,255,.3)';
  X.fillText(G.hP?'✓':'○',ix+124,iy);
  X.fillStyle='#66BB6A';X.fillText('🌶'+G.pep,ix+138,iy);
}

// ── DRAW: SCREENS ──
function drawTitle(){
  // Dim overlay
  X.fillStyle='rgba(26,26,46,.55)';X.fillRect(0,0,W,H);
  // Title
  X.textAlign='center';
  X.font='bold 48px monospace';
  X.fillStyle='#FF6F00';X.fillText('MENEMEN RUN',W/2+2,102);
  X.fillStyle='#FFCA28';X.fillText('MENEMEN RUN',W/2,100);
  // Subtitle
  X.font='bold 14px monospace';
  X.fillStyle='#fff';
  const blink=Math.sin(Date.now()*.004)>.2;
  if(blink)X.fillText('Press SPACE or Tap to Start',W/2,170);
  // Character preview — draw at center
  const oldY=G.y,oldPhase=G.phase;
  G.y=GND;G.phase=0;
  const savePX=PX;
  // We draw char at center
  X.save();X.translate(W/2-PX,60);
  drawChar();
  X.restore();
  G.y=oldY;G.phase=oldPhase;
  // Ingredients floating
  X.font='24px serif';
  X.fillText('🥚  🍅  🌶️',W/2,210);
  // Credits
  X.font='11px monospace';X.fillStyle='rgba(255,255,255,.4)';
  X.fillText('dodge pans · collect ingredients · make menemen',W/2,250);
}

function drawGameOver(){
  // Overlay
  X.fillStyle='rgba(26,26,46,.7)';X.fillRect(0,0,W,H);
  X.textAlign='center';
  // Message
  X.font='bold 28px monospace';
  X.fillStyle='#EF5350';X.fillText('You forgot to eat.',W/2,80);
  X.font='bold 18px monospace';
  X.fillStyle='#FFCA28';X.fillText('Try again.',W/2,110);
  // Score
  X.font='bold 16px monospace';X.fillStyle='#fff';
  X.fillText('SCORE: '+G.score,W/2,150);
  X.fillStyle='#FFD54F';
  X.fillText('HIGH SCORE: '+G.hi,W/2,172);
  // Ingredient tally
  X.font='16px monospace';X.fillStyle='#B0BEC5';
  X.fillText('🥚 ×'+G.egg+'    🍅 ×'+G.tom+'    🌶️ ×'+G.pep,W/2,204);
  if(G.combo){
    X.fillStyle='#FFCA28';X.font='bold 14px monospace';
    X.fillText('🎉 MENEMEN COMBO ACHIEVED! +50',W/2,228);
  }
  // Restart prompt
  const blink=Math.sin(Date.now()*.005)>.2;
  if(blink){
    X.font='bold 13px monospace';X.fillStyle='#fff';
    X.fillText('Press SPACE or Tap to Restart',W/2,268);
  }
}

// ── SPAWNING ──
function spawnObs(){
  const type=Math.random()<.4?0:Math.random()<.5?1:2; // pan, crate, chicken
  const widths=[48,30,34];
  const heights=[22,36,26];
  G.obs.push({x:W+10,type,w:widths[type],h:heights[type]});
}
function spawnCol(){
  const type=Math.floor(Math.random()*3); // 0=egg,1=tomato,2=pepper
  const heights=[GND-10,GND-35,GND-65,GND-90];
  const y=heights[Math.floor(Math.random()*heights.length)];
  G.col.push({x:W+10,y,type});
}

// ── GAME LOGIC ──
function collect(c){
  if(c.type===0){G.egg++;G.hE=true;G.score+=10;}
  else if(c.type===1){G.tom++;G.hT=true;G.score+=15;}
  else{G.pep++;G.hP=true;G.score+=20;}
  addPts(c.x,c.y,8,c.type===0?'#FFFDE7':c.type===1?'#EF5350':'#66BB6A',4);
  sCollect();
  // Check combo
  if(!G.combo&&G.hE&&G.hT&&G.hP){
    G.combo=true;G.cf=90;G.score+=50;
    G.sc=1; // begin scene transition
    addPts(PX,G.y-PH/2,20,'#FFD54F',6);
    sCombo();
  }
}

function gameOver(){
  G.phase=2;G.overT=Date.now();G.shake=8;
  if(G.score>G.hi){G.hi=G.score;saveHi();}
  sDie();
}

function update(){
  if(G.phase!==1)return;
  G.f++;G.walkF++;

  // Speed progression
  if(G.spd<SPD*2)G.spd+=.003;
  else G.spd+=.0006;

  // Score (distance)
  G.score+=1;

  // Physics
  if(G.y<GND){G.vy+=GRV;}
  G.y+=G.vy;
  if(G.y>=GND){G.y=GND;G.vy=0;}

  // Background scroll
  G.bx+=G.spd*.35;
  G.bx2+=G.spd;

  // Spawn obstacles
  G.ot--;
  if(G.ot<=0){
    spawnObs();
    G.ot=Math.max(35,80+Math.random()*60-G.spd*6);
  }
  // Spawn collectibles
  G.ct--;
  if(G.ct<=0){
    spawnCol();
    G.ct=70+Math.random()*50;
  }

  // Update obstacles
  for(let i=G.obs.length-1;i>=0;i--){
    G.obs[i].x-=G.spd;
    if(G.obs[i].x<-60)G.obs.splice(i,1);
  }

  // Update collectibles
  for(let i=G.col.length-1;i>=0;i--){
    G.col[i].x-=G.spd;
    if(G.col[i].x<-20){G.col.splice(i,1);continue;}
    // Collection check (circle-based)
    const c=G.col[i];
    const dx=PX-c.x,dy=(G.y-PH/2)-c.y;
    if(dx*dx+dy*dy<22*22){
      collect(c);G.col.splice(i,1);
    }
  }

  // Collision with obstacles (AABB with forgiveness)
  const ph=G.crouching?30:PH;
  const px=PX-PW/2+4,py=G.y-ph+4,pw=PW-8,ppH=ph-6;
  for(const o of G.obs){
    const ox=o.x,oy=GND-o.h;
    if(aabb(px,py,pw,ppH,ox+3,oy+3,o.w-6,o.h-3)){
      gameOver();return;
    }
  }

  // Particles
  updatePts();

  // Scene transition
  if(G.sc===1){
    G.st+=.018;
    if(G.st>=1){G.st=1;G.sc=2;}
  }

  // Combo flash countdown
  if(G.cf>0)G.cf--;

  // Shake decay
  if(G.shake>0)G.shake*=.85;
  if(G.shake<.5)G.shake=0;
}

// ── INPUT ──
let inputReady=true;
function handleAction(){
  initAudio();
  if(G.phase===0){
    G.phase=1;G.f=0;G.walkF=0;
    return;
  }
  if(G.phase===2){
    if(Date.now()-G.overT<400)return;
    reset();G.phase=1;
    return;
  }
  if(G.phase===1&&G.y>=GND&&!G.crouching){
    G.vy=JMP;
    sJump();
  }
}
document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();handleAction();}
  if(e.code==='ArrowDown'&&G.phase===1){e.preventDefault();G.crouching=true;}
});
document.addEventListener('keyup',e=>{
  if(e.code==='ArrowDown')G.crouching=false;
});
C.addEventListener('touchstart',e=>{e.preventDefault();handleAction();},{passive:false});

// ── MAIN LOOP ──
function frame(){
  update();

  // Shake offset
  const sx=G.shake?(Math.random()-.5)*G.shake:0;
  const sy=G.shake?(Math.random()-.5)*G.shake:0;

  X.save();
  X.translate(sx,sy);

  // Draw world
  drawSky();
  if(G.st<.5)drawStreetBg();
  if(G.st>0)drawKitchenBg();
  drawGround();

  // Obstacles
  for(const o of G.obs)drawObs(o);
  // Collectibles
  for(const c of G.col)drawCol(c);
  // Character
  drawChar();
  // Particles
  drawPts();

  // Combo flash overlay
  if(G.cf>60){
    X.fillStyle=`rgba(255,255,200,${(G.cf-60)/30*.5})`;
    X.fillRect(0,0,W,H);
  }
  if(G.cf>0&&G.cf<=80){
    X.save();X.textAlign='center';
    X.font='bold 42px monospace';
    X.globalAlpha=Math.min(1,G.cf/20);
    X.fillStyle='#FF6F00';X.fillText('MENEMEN!',W/2+2,H/2+2);
    X.fillStyle='#FFCA28';X.fillText('MENEMEN!',W/2,H/2);
    X.font='bold 16px monospace';
    X.fillStyle='#FFF';X.fillText('+50 COMBO BONUS',W/2,H/2+28);
    X.restore();
  }

  // HUD (always on during gameplay)
  if(G.phase===1||G.phase===2)drawHUD();
  // Screens
  if(G.phase===0)drawTitle();
  if(G.phase===2)drawGameOver();

  X.restore();
  requestAnimationFrame(frame);
}

// ── INIT ──
reset();
// Initial background render
G.bx=0;G.bx2=0;
frame();
</script>
