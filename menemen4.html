<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Menemen 4: Operation Fish Fry</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;touch-action:none;user-select:none;font-family:'Press Start 2P', cursive}
canvas{max-width:100%;height:auto;max-height:100vh;image-rendering:pixelated;border:4px solid #333;box-shadow:0 0 40px rgba(255,150,0,.3);position:relative;z-index:10}

/* CRT Overlay */
body::before {
    content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
    z-index: 100; background-size: 100% 2px, 3px 100%; pointer-events: none;
}

#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300}
#btn1, #btnStart, #btnStory{pointer-events:auto;display:none;margin-top:140px;padding:14px 28px;background:#FF9800;color:#000;text-decoration:none;font-weight:bold;border:4px solid #fff;cursor:pointer;font-family:inherit;font-size:12px;transition:0.1s;box-shadow:6px 6px 0 rgba(0,0,0,0.4)}
#btnStart{background:#4CAF50;color:#fff;border-color:#fff;z-index:301}
#btnStory{display:block;margin-top:140px;z-index:301;background:#FF5722}
#btnStory:hover, #btnStart:hover, #btn1:hover{transform:translate(-2px,-2px);box-shadow:8px 8px 0 rgba(0,0,0,0.5)}
#btn1{margin-top:20px;background:rgba(255,152,0,0.8);color:#fff;border-color:rgba(255,255,255,0.5)}
</style>
</head>
<body>
<div id="ui">
   <button id="btnStory" onclick="showIntro()">READ DISPATCHES</button>
   <button id="btnStart" onclick="startLevel()">START FISHING</button>
   <a id="btn1" href="index.html">RETURN TO HUB</a>
 </div>

<canvas id="c"></canvas>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
const W=500,H=700;
C.width=W;C.height=H;

let AC=null;
function iA(){if(!AC)try{AC=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}
function tn(f1,f2,d,v,t='sine'){if(!AC)return;try{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=t;o.frequency.setValueAtTime(f1,AC.currentTime);o.frequency.linearRampToValueAtTime(f2,AC.currentTime+d);g.gain.setValueAtTime(v||.12,AC.currentTime);g.gain.linearRampToValueAtTime(0,AC.currentTime+d);o.start();o.stop(AC.currentTime+d)}catch(e){}}

const sCatch=()=>tn(400,800,.15,.15,'square');
const sHit=()=>tn(200,50,.3,.2,'sawtooth');

function playChristianMusic(){
  if(!AC || G.phase !== 1) return;
  if(AC.currentTime > nextBeat){
    const notes = [261.63, 329.63, 392.00, 349.23, 293.66, 329.63, 261.63, 196.00];
    const note = notes[beatIdx % notes.length];
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(note, AC.currentTime);
    g.gain.setValueAtTime(0.08, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.5);
    o.connect(g); g.connect(AC.destination);
    o.start(); o.stop(AC.currentTime + 0.5);
    
    const o2 = AC.createOscillator(), g2 = AC.createGain();
    o2.type = 'sine';
    o2.frequency.setValueAtTime(note * 1.5, AC.currentTime);
    g2.gain.setValueAtTime(0.04, AC.currentTime);
    g2.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.4);
    o2.connect(g2); g2.connect(AC.destination);
    o2.start(); o2.stop(AC.currentTime + 0.4);
    
    nextBeat = AC.currentTime + 0.6; beatIdx++;
  }
}

function lHi(){try{return parseInt(localStorage.getItem('menemen4Hi'))||0}catch(e){return 0}}
function sHi(){try{localStorage.setItem('menemen4Hi',G.hi)}catch(e){}}

function reset(){
  G={
   phase:-2, is:0, it:0,
   playerX:W/2, playerY:H-100, playerW:40, playerH:50,
   score:0, hi:lHi(),
   items:[], pts:[],
   fish:0, tomato:0, pepper:0,
   lives:3, iframes:0,
   shake:0,
   keys:{l:0,r:0},
   spawnTimer:60, diff:1,
   storyPage:1
  };
}

// Draw Ibo character
function drawIbo(x, y){
  X.save();
  X.translate(x, y);
  
  // Body (Turkish vest)
  X.fillStyle = '#7B1818';
  X.fillRect(-12, -20, 24, 25);
  X.fillStyle = '#B71C1C';
  X.fillRect(-12, -20, 6, 25);
  X.fillRect(6, -20, 6, 25);
  X.fillStyle = '#FFD600';
  X.fillRect(-12, 0, 24, 3);
  
  // Head
  X.fillStyle = '#FFE0BD';
  X.beginPath();
  X.arc(0, -28, 12, 0, Math.PI * 2);
  X.fill();
  
  // Hair (natural dark)
  X.fillStyle = '#1A1A1A';
  X.beginPath();
  X.arc(0, -32, 12, Math.PI, 0);
  X.fill();
  
  // Eyes
  X.fillStyle = '#1A1A1A';
  X.fillRect(-5, -30, 3, 3);
  X.fillRect(2, -30, 3, 3);
  
  // Mouth
  X.strokeStyle = '#1A1A1A';
  X.lineWidth = 1;
  X.beginPath();
  X.arc(0, -24, 4, 0, Math.PI);
  X.stroke();
  
  X.restore();
}

// Draw Iggy character
function drawIggy(x, y){
  X.save();
  X.translate(x, y);
  
  // Body
  X.fillStyle = '#5C4033';
  X.fillRect(-12, -20, 24, 25);
  X.fillStyle = '#8B5A2B';
  X.fillRect(-12, -20, 6, 25);
  X.fillRect(6, -20, 6, 25);
  
  // Head
  X.fillStyle = '#FFCBA4';
  X.beginPath();
  X.arc(0, -28, 12, 0, Math.PI * 2);
  X.fill();
  
  // Fedora hat
  X.fillStyle = '#654321';
  X.beginPath();
  X.ellipse(0, -36, 14, 5, 0, 0, Math.PI * 2);
  X.fill();
  X.fillRect(-11, -44, 22, 10);
  X.fillStyle = '#1A1A1A';
  X.fillRect(-11, -36, 22, 4);
  
  // Eyes
  X.fillStyle = '#1A1A1A';
  X.fillRect(-5, -30, 3, 3);
  X.fillRect(2, -30, 3, 3);
  
  // Mustache
  X.fillStyle = '#4E342E';
  X.fillRect(-6, -24, 12, 3);
  
  X.restore();
}

function drawItem(item){
  const x = item.x, y = item.y;
  if(item.type==='fish'){
    X.fillStyle='#90CAF9';
    X.beginPath();X.ellipse(x,y,12,6,0,0,Math.PI*2);X.fill();
    X.fillStyle='#64B5F6';
    X.beginPath();X.moveTo(x-12,y);X.lineTo(x-16,y-4);X.lineTo(x-16,y+4);X.fill();
    X.fillStyle='#000';
    X.beginPath();X.arc(x-5,y-1,1.5,0,Math.PI*2);X.fill();
  } else if(item.type==='tomato'){
    X.fillStyle='#E53935';X.beginPath();X.arc(x,y,8,0,Math.PI*2);X.fill();
    X.fillStyle='#4CAF50';X.fillRect(x-1.5,y-10,3,3);
  } else if(item.type==='pepper'){
    X.fillStyle='#43A047';X.beginPath();X.moveTo(x,y-8);X.bezierCurveTo(x+6,-4,x+6,4,x,8);X.bezierCurveTo(x-6,4,x-6,-4,x,y-8);X.fill();
  } else if(item.type==='mine'){
    X.fillStyle='#212121';X.beginPath();X.arc(x,y,10,0,Math.PI*2);X.fill();
    X.strokeStyle='#F44336';X.lineWidth=2;
    for(let i=0;i<6;i++){
      const a=i*Math.PI/3;
      X.beginPath();X.moveTo(x+Math.cos(a)*10,y+Math.sin(a)*10);X.lineTo(x+Math.cos(a)*15,y+Math.sin(a)*15);X.stroke();
    }
  }
}

function drawHUD(){
  X.font='bold 10px "Press Start 2P"';X.textAlign='left';X.fillStyle='rgba(255,255,255,.7)';X.fillText('SCORE',12,22);X.fillStyle='#FFF';X.fillText(String(G.score),12,38);
  X.textAlign='right';X.fillStyle='rgba(255,255,255,.7)';X.fillText('BEST',W-12,22);X.fillStyle='#FFD54F';X.fillText(String(G.hi),W-12,38);
  
  // Lives
  for(let i=0;i<3;i++){
    X.fillStyle=i<G.lives?'#FF1744':'rgba(255,255,255,.2)';
    const hx=W/2-20+i*20,hy=28;
    X.beginPath();X.moveTo(hx,hy+4);X.bezierCurveTo(hx-8,hy-4,hx-8,hy-12,hx,hy-6);X.bezierCurveTo(hx+8,hy-12,hx+8,hy-4,hx,hy+4);X.fill();
  }
  
  X.textAlign='left';const ix=12,iy=56;
  X.fillStyle=G.fish>0?'#90CAF9':'rgba(255,255,255,.3)';X.fillText('🐟'+G.fish,ix,iy);
  X.fillStyle=G.tomato>0?'#E53935':'rgba(255,255,255,.3)';X.fillText('🍅'+G.tomato,ix+60,iy);
  X.fillStyle=G.pepper>0?'#43A047':'rgba(255,255,255,.3)';X.fillText('🌶'+G.pepper,ix+120,iy);
}

function drawSky(){
  const grad=X.createLinearGradient(0,0,0,H*0.4);
  grad.addColorStop(0,'#FF9800');
  grad.addColorStop(0.5,'#FFB74D');
  grad.addColorStop(1,'#81D4FA');
  X.fillStyle=grad;
  X.fillRect(0,0,W,H*0.4);
  
  // Sun
  X.fillStyle='#FFF176';
  X.beginPath();X.arc(W-50,60,25,0,Math.PI*2);X.fill();
}

function drawOcean(){
  const grad=X.createLinearGradient(0,H*0.4,0,H);
  grad.addColorStop(0,'#0288D1');
  grad.addColorStop(1,'#01579B');
  X.fillStyle=grad;
  X.fillRect(0,H*0.4,W,H*0.6);
}

function update(){
  if(G.phase<=0 || G.phase===3) return;
  
  G.diff+=0.0003;
  
  // Player movement
  if(G.keys.l) G.playerX-=5;
  if(G.keys.r) G.playerX+=5;
  if(G.playerX<G.playerW/2) G.playerX=G.playerW/2;
  if(G.playerX>W-G.playerW/2) G.playerX=W-G.playerW/2;
  
  // Spawn items
  G.spawnTimer--;
  if(G.spawnTimer<=0){
    G.spawnTimer=Math.max(30, 50-G.diff*5)+Math.random()*20;
    const r=Math.random();
    let type;
    if(r<0.5) type='fish';
    else if(r<0.7) type='tomato';
    else if(r<0.85) type='pepper';
    else type='mine';
    
    G.items.push({x:30+Math.random()*(W-60),y:-15,type:type,speed:2+Math.random()*2+G.diff*0.5});
  }
  
  // Update items
  for(let i=G.items.length-1;i>=0;i--){
    const item=G.items[i];
    item.y+=item.speed;
    
    // Check collision with player
    if(G.iframes<=0 && Math.abs(item.x-G.playerX)<25 && Math.abs(item.y-G.playerY)<30){
      if(item.type==='mine'){
        // Hit mine
        G.lives--;
        G.iframes=60;
        G.shake=10;
        sHit();
        aP(item.x,item.y,15,'#FF5722',5);
        if(G.lives<=0){
          G.phase=3;
          if(G.score>G.hi){G.hi=G.score;sHi();}
        }
      } else {
        // Collect item
        if(item.type==='fish'){G.fish++;G.score+=10;}
        else if(item.type==='tomato'){G.tomato++;G.score+=15;}
        else if(item.type==='pepper'){G.pepper++;G.score+=20;}
        sCatch();
        aP(item.x,item.y,8,item.type==='fish'?'#90CAF9':item.type==='tomato'?'#E53935':'#43A047',4);
      }
      G.items.splice(i,1);
      continue;
    }
    
    if(item.y>H+20) G.items.splice(i,1);
  }
  
  if(G.iframes>0) G.iframes--;
  if(G.shake>0.1) G.shake*=0.9; else G.shake=0;
}

function aP(x,y,n,c,s){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,v=1+Math.random()*(s||3);G.pts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-1,life:30+Math.random()*20,max:50,c,sz:2+Math.random()*3})}}

function drawGameOver(){
  X.fillStyle='rgba(0,0,0,0.75)';X.fillRect(0,0,W,H);
  
  // Beach scene
  X.fillStyle='#FFE0B2';X.fillRect(0,H*0.6,W,H*0.4);
  
  // Bonfire
  X.fillStyle='#795548';X.fillRect(W/2-15,H*0.65,30,15);
  X.fillStyle='#FF5722';X.beginPath();X.moveTo(W/2-12,H*0.65);X.lineTo(W/2,H*0.65-25);X.lineTo(W/2+12,H*0.65);X.fill();
  X.fillStyle='#FF9800';X.beginPath();X.moveTo(W/2-8,H*0.65);X.lineTo(W/2,H*0.65-18);X.lineTo(W/2+8,H*0.65);X.fill();
  
  // Fish on fire
  X.fillStyle='#90CAF9';X.beginPath();X.ellipse(W/2,H*0.65-3,10,5,0,0,Math.PI*2);X.fill();
  
  // Ibo and Iggy by fire
  drawIbo(W/2-60,H*0.62);
  drawIggy(W/2+60,H*0.62);
  
  // Aloha girls
  for(let i=0;i<3;i++){
    const gx=W*0.2+i*W*0.3;
    const gy=H*0.62+Math.sin(Date.now()*0.005+i)*8;
    X.fillStyle='rgba(233,30,99,0.3)';
    X.beginPath();X.arc(gx,gy-12,6,0,Math.PI*2);X.fill();
    X.fillRect(gx-4,gy-4,8,20);
  }
  
  X.textAlign='center';
  X.font='bold 20px "Press Start 2P"';X.fillStyle='#FF9800';X.fillText('BEACH BBQ TIME!',W/2,H*0.25);
  X.font='bold 12px "Press Start 2P"';X.fillStyle='#FFF';X.fillText('SCORE: '+G.score,W/2,H*0.32);
  X.fillStyle='#BDBDBD';X.font='bold 10px "Press Start 2P"';X.fillText('BEST: '+G.hi,W/2,H*0.36);
  
  if(G.dieT>40){
    X.font='italic 10px "Press Start 2P"';X.fillStyle='#FFEB3B';
    X.fillText('No war, just fish and friends!',W/2,H*0.40);
  }
  if(Math.sin(Date.now()*0.005)>0.2){X.font='bold 9px "Press Start 2P"';X.fillStyle='#FFF';X.fillText('Press SPACE to Restart',W/2,H*0.45);}
}

function frame(){
  update();
  const sh=G.shake>0.3,sx=sh?(Math.random()-0.5)*G.shake:0,sy=sh?(Math.random()-0.5)*G.shake:0;
  X.save();X.translate(sx,sy);
  
  drawSky();
  drawOcean();
  
  if(G.phase===-2){
    // Title screen
    X.fillStyle='rgba(0,0,0,0.65)';X.fillRect(0,0,W,H);
    X.textAlign='center';
    X.font='bold 24px "Press Start 2P"';X.fillStyle='#FF9800';X.fillText('OPERATION',W/2,H*0.28);
    X.font='bold 28px "Press Start 2P"';X.fillStyle='#FF5722';X.fillText('FISH FRY',W/2,H*0.36);
    X.font='9px "Press Start 2P"';X.fillStyle='#FFF';X.fillText('A Menemen Adventure',W/2,H*0.42);
  } else if(G.phase===0){
    // Instructions
    X.fillStyle='rgba(0,0,0,0.8)';X.fillRect(0,0,W,H);
    X.textAlign='center';
    X.font='bold 18px "Press Start 2P"';X.fillStyle='#4CAF50';X.fillText('HOW TO PLAY',W/2,H*0.2);
    X.font='10px "Press Start 2P"';X.fillStyle='#FFF';
    X.fillText('← → to move',W/2,H*0.32);
    X.fillText('Catch fish & ingredients',W/2,H*0.40);
    X.fillText('Avoid the mines!',W/2,H*0.48);
    if(Math.sin(Date.now()*0.005)>0.2){
      X.font='bold 11px "Press Start 2P"';X.fillStyle='#FFF';
      X.fillText('> PRESS SPACE TO START <',W/2,H*0.60);
    }
  } else if(G.phase===3){
    // Game over
    for(const item of G.items) drawItem(item);
    drawIbo(G.playerX,G.playerY);
    drawGameOver();
  } else if(G.phase===1){
    // Gameplay
    for(const item of G.items) drawItem(item);
    
    // Draw player (Ibo)
    if(G.iframes<=0||Math.floor(G.iframes/4)%2===0){
      drawIbo(G.playerX,G.playerY);
    }
    
    drawHUD();
  }
  
  X.restore();
  requestAnimationFrame(frame);
  playChristianMusic();
}

function handleK(e,v){
  if(e.code==='Space'){
    if(v && G.phase===-2){showIntro();}
    else if(v && G.phase===0){startLevel();}
    else if(v && G.phase===3){reset();document.getElementById('btn1').style.display='none';showIntro();}
    e.preventDefault();
  }
  if(e.code==='ArrowLeft'||e.code==='KeyA') G.keys.l=v;
  if(e.code==='ArrowRight'||e.code==='KeyD') G.keys.r=v;
}
document.addEventListener('keydown',handleK);
document.addEventListener('keyup',e=>handleK(e,0));
C.addEventListener('touchstart',e=>{
  e.preventDefault();iA();
  if(G.phase===-2){showIntro();}
  else if(G.phase===0){startLevel();}
  else if(G.phase===3){reset();document.getElementById('btn1').style.display='none';showIntro();}
  else{
    if(e.touches[0].clientX<window.innerWidth/2) G.keys.l=1;
    else G.keys.r=1;
  }
},{passive:false});
C.addEventListener('touchend',e=>{G.keys.l=0;G.keys.r=0;});

function showIntro(){
  iA();
  G.phase=0;
  document.getElementById('btnStory').style.display='none';
  document.getElementById('btnStart').style.display='block';
}

function startLevel(){
  G.phase=1;
  G.score=0;G.fish=0;G.tomato=0;G.pepper=0;
  G.playerX=W/2;G.items=[];G.spawnTimer=60;G.diff=1;G.iframes=0;G.lives=3;G.shake=0;
  document.getElementById('btnStart').style.display='none';
}

reset();frame();
</script>
</body>
</html>
